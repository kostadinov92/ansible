- name: Add Brave GPG key
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: "0644"

- name: Add Brave apt repository (DEB822 format)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/brave-browser.sources
    content: |
      Types: deb
      URIs: https://brave-browser-apt-release.s3.brave.com/
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: "0644"

- name: Remove legacy Brave .list files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/brave-browser.list
    - /etc/apt/sources.list.d/brave-browser.list.bak

- name: Install Brave browser
  ansible.builtin.apt:
    name: brave-browser
    state: present
    update_cache: true
