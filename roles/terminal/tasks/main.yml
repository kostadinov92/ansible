- name: Install terminal tools from apt
  ansible.builtin.apt:
    name:
      - fzf
      - bat
      - ripgrep
      - kitty
    state: present

- name: Install tldr via pipx
  become: false
  community.general.pipx:
    name: tldr
    state: present

- name: Download eza GPG key
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/eza-community/eza/main/deb.asc
    dest: /tmp/gierens.asc
    mode: "0644"

- name: Dearmor eza GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/gierens.gpg /tmp/gierens.asc
    creates: /usr/share/keyrings/gierens.gpg

- name: Clean up eza ASCII key
  ansible.builtin.file:
    path: /tmp/gierens.asc
    state: absent

- name: Remove old eza ASCII key if present
  ansible.builtin.file:
    path: /usr/share/keyrings/gierens.asc
    state: absent

- name: Add eza repository (DEB822 format)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/gierens.sources
    content: |
      Types: deb
      URIs: http://deb.gierens.de/
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /usr/share/keyrings/gierens.gpg
    mode: "0644"

- name: Remove legacy eza .list files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/gierens.list
    - /etc/apt/sources.list.d/gierens.list.bak

- name: Install eza
  ansible.builtin.apt:
    name: eza
    state: present
    update_cache: true

- name: Get latest lazydocker version
  ansible.builtin.uri:
    url: https://api.github.com/repos/jesseduffield/lazydocker/releases/latest
    return_content: true
  register: terminal_lazydocker_release

- name: Set lazydocker version
  ansible.builtin.set_fact:
    terminal_lazydocker_version: "{{ terminal_lazydocker_release.json.tag_name | regex_replace('^v', '') }}"

- name: Download lazydocker
  ansible.builtin.get_url:
    url: "https://github.com/jesseduffield/lazydocker/releases/\
      download/v{{ terminal_lazydocker_version }}/\
      lazydocker_{{ terminal_lazydocker_version }}_Linux_x86_64.tar.gz"
    dest: /tmp/lazydocker.tar.gz
    mode: "0644"

- name: Extract lazydocker
  ansible.builtin.unarchive:
    src: /tmp/lazydocker.tar.gz
    dest: /usr/local/bin
    remote_src: true
    include:
      - lazydocker
    mode: "0755"

- name: Clean up lazydocker archive
  ansible.builtin.file:
    path: /tmp/lazydocker.tar.gz
    state: absent
