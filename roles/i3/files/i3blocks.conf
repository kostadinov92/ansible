separator_block_width=15
markup=pango

[disk]
command=echo " / $(df -h / | awk 'NR==2{print $3 "/" $2}')  /home $(df -h /home | awk 'NR==2{print $3 "/" $2}')"
interval=300
color=#D8DEE9

[memory]
command=echo " $(free -h | awk '/Mem:/{print $3 "/" $2}')"
interval=10
color=#D8DEE9

[cpu]
command=echo " $(top -bn1 | awk '/Cpu\(s\)/{printf "%.0f%%", $2+$4}')"
interval=10
color=#D8DEE9

[temperature]
command=echo " $(sensors 2>/dev/null | awk '/Package id 0:/{gsub(/\+/,""); print $4; exit}' || echo 'N/A')"
interval=30
color=#D8DEE9

[wifi]
command=WIFI=$(nmcli -t -f active,ssid dev wifi 2>/dev/null | grep '^yes' | cut -d: -f2); if [ -n "$WIFI" ]; then echo " $WIFI"; elif nmcli -t -f type,state dev 2>/dev/null | grep -q 'ethernet:connected'; then echo " ethernet"; else echo " disconnected"; fi
interval=30
color=#D8DEE9

[keyboard]
command=MASK=$(xset -q 2>/dev/null | grep 'LED mask' | awk '{print $NF}'); if [ "$MASK" = "00000000" ]; then echo " US"; else echo " BG"; fi
interval=1
color=#D8DEE9

[volume]
command=VOL=$(wpctl get-volume @DEFAULT_AUDIO_SINK@); echo " $(echo $VOL | awk '{printf "%.0f%%", $2*100}') $(echo $VOL | grep -q MUTED && echo '[MUTE]')"
interval=once
signal=1
color=#D8DEE9

[battery]
command=BATT=$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo "?"); STATUS=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null || echo "Unknown"); if [ "$STATUS" = "Charging" ]; then ICON=""; elif [ "$BATT" -ge 80 ] 2>/dev/null; then ICON=""; elif [ "$BATT" -ge 50 ] 2>/dev/null; then ICON=""; elif [ "$BATT" -ge 20 ] 2>/dev/null; then ICON=""; else ICON=""; fi; echo "$ICON $BATT%"
interval=30
color=#D8DEE9

[datetime]
command=echo " $(date '+%a %Y-%m-%d')  $(date '+%H:%M')"
interval=30
color=#D8DEE9
