separator_block_width=15
markup=pango

[disk]
command=echo " $(df -h / | awk 'NR==2{print $4}')"
interval=300
color=#D8DEE9

[memory]
command=echo " $(free -h | awk '/Mem:/{print $3 "/" $2}')"
interval=10
color=#D8DEE9

[cpu]
command=echo " $(top -bn1 | awk '/Cpu\(s\)/{printf "%.0f%%", $2+$4}')"
interval=10
color=#D8DEE9

[temperature]
command=echo " $(sensors 2>/dev/null | awk '/Package id 0:|Tctl:/{gsub(/\+/,""); print $NF; exit}' || echo 'N/A')"
interval=30
color=#D8DEE9

[wifi]
command=echo " $(iwgetid -r 2>/dev/null || echo 'disconnected')"
interval=30
color=#D8DEE9

[volume]
command=echo " $(pactl get-sink-volume @DEFAULT_SINK@ | awk '{print $5}') $(pactl get-sink-mute @DEFAULT_SINK@ | grep -q yes && echo '[MUTE]')"
interval=once
signal=1
color=#D8DEE9

[battery]
command=BATT=$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo "?"); STATUS=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null || echo "Unknown"); if [ "$STATUS" = "Charging" ]; then ICON=""; elif [ "$BATT" -ge 80 ] 2>/dev/null; then ICON=""; elif [ "$BATT" -ge 50 ] 2>/dev/null; then ICON=""; elif [ "$BATT" -ge 20 ] 2>/dev/null; then ICON=""; else ICON=""; fi; echo "$ICON $BATT%"
interval=30
color=#D8DEE9

[datetime]
command=echo " $(date '+%a %Y-%m-%d')  $(date '+%H:%M')"
interval=30
color=#D8DEE9
