# Backend
backend = "glx";

# VSync (eliminates screen tearing)
vsync = true;

# Shadows
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.5;
shadow-offset-x = -4;
shadow-offset-y = -4;

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'i3-frame'",
    "class_g = 'Rofi'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# Fading
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;
no-fading-openclose = false;

# Opacity (dim inactive windows slightly)
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
detect-client-opacity = true;

# Rounded corners
corner-radius = 6;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];

# General
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

# Window types
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 1.0; focus = true; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 1.0; shadow = false; };
    dropdown_menu = { opacity = 1.0; shadow = false; };
};
