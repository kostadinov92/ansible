- name: Install i3 and utilities
  ansible.builtin.apt:
    name:
      - i3
      - i3blocks
      - i3lock
      - i3lock-fancy
      - rofi
      - picom
      - dunst
      - feh
      - maim
      - xclip
      - brightnessctl
      - playerctl
      - pavucontrol
      - network-manager-gnome
      - blueman
      - lm-sensors
      - dex
      - xss-lock
      - lxpolkit
      - libnotify-bin
      - kbdd
    state: present

- name: Add user to video group (for brightnessctl)
  ansible.builtin.user:
    name: "{{ lookup('env', 'USER') }}"
    groups: video
    append: true

- name: Allow video group to control backlight
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/90-backlight.rules
    content: |
      ACTION=="add", SUBSYSTEM=="backlight", RUN+="/bin/chgrp video /sys/class/backlight/%k/brightness"
      ACTION=="add", SUBSYSTEM=="backlight", RUN+="/bin/chmod g+w /sys/class/backlight/%k/brightness"
    mode: "0644"
  notify: Reload udev rules

- name: Create i3 config directory
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/i3"
    state: directory
    mode: "0755"

- name: Create i3blocks config directory
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/i3blocks"
    state: directory
    mode: "0755"

- name: Create picom config directory
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/picom"
    state: directory
    mode: "0755"

- name: Create dunst config directory
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/dunst"
    state: directory
    mode: "0755"

- name: Copy i3 config
  become: false
  ansible.builtin.template:
    src: config.j2
    dest: "{{ lookup('env', 'HOME') }}/.config/i3/config"
    mode: "0644"

- name: Copy power menu script
  become: false
  ansible.builtin.copy:
    src: power-menu.sh
    dest: "{{ lookup('env', 'HOME') }}/.config/i3/power-menu.sh"
    mode: "0755"

- name: Create i3blocks blocklets directory
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/i3blocks/blocklets"
    state: directory
    mode: "0755"

- name: Copy i3blocks config
  become: false
  ansible.builtin.copy:
    src: i3blocks.conf
    dest: "{{ lookup('env', 'HOME') }}/.config/i3blocks/config"
    mode: "0644"

- name: Copy i3blocks blocklet scripts
  become: false
  ansible.builtin.copy:
    src: "blocklets/"
    dest: "{{ lookup('env', 'HOME') }}/.config/i3blocks/blocklets/"
    mode: "0755"

- name: Copy picom config
  become: false
  ansible.builtin.copy:
    src: picom.conf
    dest: "{{ lookup('env', 'HOME') }}/.config/picom/picom.conf"
    mode: "0644"

- name: Copy dunst config
  become: false
  ansible.builtin.copy:
    src: dunstrc
    dest: "{{ lookup('env', 'HOME') }}/.config/dunst/dunstrc"
    mode: "0644"

- name: Create Pictures directory for wallpapers and screenshots
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/Pictures"
    state: directory
    mode: "0755"
