- name: Check if VSCode is installed
  ansible.builtin.command: dpkg -s code
  register: vscode_installed
  changed_when: false
  failed_when: false

- name: Download VSCode deb package
  ansible.builtin.get_url:
    url: https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64
    dest: /tmp/code.deb
    mode: "0644"
  when: vscode_installed.rc != 0

- name: Install VSCode from deb
  ansible.builtin.apt:
    deb: /tmp/code.deb
  when: vscode_installed.rc != 0

- name: Clean up VSCode deb package
  ansible.builtin.file:
    path: /tmp/code.deb
    state: absent
  when: vscode_installed.rc != 0

- name: Remove manually added VSCode repo (managed by VSCode)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.list
    state: absent

- name: Remove manually added Microsoft GPG key (managed by VSCode)
  ansible.builtin.file:
    path: /usr/share/keyrings/microsoft.asc
    state: absent
