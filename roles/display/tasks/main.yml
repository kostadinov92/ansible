- name: Install Xorg
  ansible.builtin.apt:
    name:
      - xorg
      - dbus-x11
    state: present

- name: Pre-seed LightDM as default display manager
  ansible.builtin.debconf:
    name: lightdm
    question: shared/default-x-display-manager
    vtype: select
    value: lightdm

- name: Install LightDM
  ansible.builtin.apt:
    name:
      - lightdm
      - lightdm-gtk-greeter
      - accountsservice
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Set i3 as default LightDM session
  ansible.builtin.ini_file:
    path: /etc/lightdm/lightdm.conf.d/50-i3.conf
    section: "Seat:*"
    option: user-session
    value: i3
    create: true
    mode: "0644"

- name: Check if another display manager is active
  ansible.builtin.stat:
    path: /etc/systemd/system/display-manager.service
  register: display_dm_service

- name: Enable LightDM
  ansible.builtin.systemd:
    name: lightdm
    enabled: true
  when: not display_dm_service.stat.exists

- name: Install PipeWire audio stack
  ansible.builtin.apt:
    name:
      - pipewire
      - pipewire-pulse
      - pipewire-alsa
      - wireplumber
    state: present

- name: Install Bluetooth
  ansible.builtin.apt:
    name:
      - bluez
      - bluez-tools
    state: present

- name: Enable Bluetooth service
  ansible.builtin.systemd:
    name: bluetooth
    enabled: true

- name: Install NetworkManager
  ansible.builtin.apt:
    name:
      - network-manager
    state: present

- name: Configure NetworkManager to manage all devices
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/10-manage-all.conf
    content: |
      [device]
      wifi.scan-rand-mac-address=no

      [main]
      plugins=keyfile

      [ifupdown]
      managed=true
    mode: "0644"
  notify: Restart NetworkManager

- name: Check if systemd-networkd is active (Ubuntu Server)
  ansible.builtin.systemd:
    name: systemd-networkd
  register: display_networkd_status
  changed_when: false

- name: Switch netplan to NetworkManager renderer (Ubuntu Server)
  ansible.builtin.copy:
    dest: /etc/netplan/01-network-manager.yaml
    content: |
      network:
        version: 2
        renderer: NetworkManager
    mode: "0600"
  when: display_networkd_status.status.ActiveState == "active"
  notify: Apply netplan

- name: Disable systemd-networkd (Ubuntu Server)
  ansible.builtin.systemd:
    name: systemd-networkd
    enabled: false
    state: stopped
  when: display_networkd_status.status.ActiveState == "active"

- name: Disable wpa_supplicant service (NetworkManager manages wifi)
  ansible.builtin.systemd:
    name: wpa_supplicant
    enabled: false
    state: stopped
  when: display_networkd_status.status.ActiveState == "active"
  failed_when: false

- name: Enable NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    enabled: true
    state: started

- name: Install desktop essentials
  ansible.builtin.apt:
    name:
      - xdg-utils
      - xdg-user-dirs
      - polkitd
      - udisks2
      - gvfs
      - gvfs-backends
      - adwaita-icon-theme
      - gnome-themes-extra
      - gtk2-engines-murrine
      - lxappearance
      - xcursor-themes
      - fonts-noto
      - fonts-noto-color-emoji
    state: present

- name: Create XDG user directories
  become: false
  ansible.builtin.command: xdg-user-dirs-update
  changed_when: false
