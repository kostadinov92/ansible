- name: Install Xorg
  ansible.builtin.apt:
    name:
      - xorg
      - dbus-x11
    state: present

- name: Install LightDM
  ansible.builtin.apt:
    name:
      - lightdm
      - lightdm-gtk-greeter
    state: present

- name: Enable LightDM
  ansible.builtin.systemd:
    name: lightdm
    enabled: true

- name: Install PipeWire audio stack
  ansible.builtin.apt:
    name:
      - pipewire
      - pipewire-pulse
      - pipewire-alsa
      - wireplumber
    state: present

- name: Install Bluetooth
  ansible.builtin.apt:
    name:
      - bluez
      - bluez-tools
    state: present

- name: Enable Bluetooth service
  ansible.builtin.systemd:
    name: bluetooth
    enabled: true

- name: Install NetworkManager
  ansible.builtin.apt:
    name:
      - network-manager
    state: present

- name: Enable NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    enabled: true

- name: Install desktop essentials
  ansible.builtin.apt:
    name:
      - xdg-utils
      - xdg-user-dirs
      - policykit-1
      - udisks2
      - gvfs
      - gvfs-backends
      - adwaita-icon-theme
      - gnome-themes-extra
      - gtk2-engines-murrine
      - lxappearance
      - xcursor-themes
      - fonts-noto
      - fonts-noto-color-emoji
    state: present

- name: Create XDG user directories
  become: false
  ansible.builtin.command: xdg-user-dirs-update
  changed_when: false
