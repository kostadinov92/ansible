- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable ufw
  community.general.ufw:
    state: enabled
