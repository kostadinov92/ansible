- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /usr/share/keyrings/nodesource.asc
    mode: "0644"

- name: Add NodeSource repository (DEB822 format)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.sources
    content: |
      Types: deb
      URIs: https://deb.nodesource.com/node_22.x/
      Suites: nodistro
      Components: main
      Architectures: amd64
      Signed-By: /usr/share/keyrings/nodesource.asc
    mode: "0644"

- name: Remove legacy NodeSource .list files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/nodesource.list
    - /etc/apt/sources.list.d/nodesource.list.bak

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
